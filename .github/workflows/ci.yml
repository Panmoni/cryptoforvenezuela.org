name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run generate-types
      - run: pnpm exec astro check
      - run: pnpm exec astro build
        env:
          # The Cloudflare adapter spins up a full worker runtime (incl. the
          # AI binding) to prerender locale pages. Workers AI has no local
          # emulation, so it always opens a remote proxy session even though
          # no prerendered page calls AI — without a token this fails
          # non-interactively in CI.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
